on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    name: Build All Platforms
    runs-on: macos-15
    steps:
      - uses: actions/checkout@main
        with:
          submodules: 'true'

      - name: Build iOS
        run: |
          cd Demo
          pod install
          xcodebuild -workspace Demo.xcworkspace -scheme iOS -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' build

      - name: Build macOS
        run: |
          cd Demo
          xcodebuild -workspace Demo.xcworkspace -scheme macOS -destination 'generic/platform=macOS' build

      - name: Build tvOS
        run: |
          cd Demo
          xcodebuild -workspace Demo.xcworkspace -scheme tvOS -sdk appletvsimulator -destination 'generic/platform=tvOS Simulator' build

      - name: Build visionOS
        run: |
          cd Demo
          xcodebuild -workspace Demo.xcworkspace -scheme visionOS -sdk xrsimulator -destination 'generic/platform=visionOS Simulator' build
